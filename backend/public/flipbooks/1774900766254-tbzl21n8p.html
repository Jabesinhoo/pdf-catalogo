<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Catálogo Interactivo - TECNONACHO S.A.S</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f172a 100%);
      color: #111827;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      gap: 16px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 12px 20px;
      border-radius: 60px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      z-index: 100;
    }

    .toolbar button {
      border: none;
      border-radius: 40px;
      padding: 10px 20px;
      cursor: pointer;
      background: #1e293b;
      color: white;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .toolbar button:hover:not(:disabled) {
      background: #8aa646;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(138, 166, 70, 0.3);
    }

    .toolbar button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .toolbar button.download-btn {
      background: #8aa646;
    }

    .toolbar button.download-btn:hover {
      background: #9bb758;
    }

    .status {
      font-size: 14px;
      font-weight: 500;
      min-width: 150px;
      text-align: center;
      background: rgba(0, 0, 0, 0.1);
      padding: 8px 16px;
      border-radius: 40px;
      color: #1e293b;
    }

    .book-wrap {
      width: min(100%, 1400px);
      display: flex;
      justify-content: center;
      perspective: 2000px;
      margin: 20px 0;
    }

    .book {
      position: relative;
      width: min(95vw, 1200px);
      height: min(75vh, 800px);
      display: flex;
      align-items: center;
      justify-content: center;
      transform-style: preserve-3d;
    }

    .spread {
      position: relative;
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .page-shell {
      position: relative;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      transform-style: preserve-3d;
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      backface-visibility: hidden;
    }

    .page-shell.left {
      transform-origin: right center;
    }

    .page-shell.right {
      transform-origin: left center;
    }

    .page-shell.flipping-left {
      transform: rotateY(-15deg);
    }

    .page-shell.flipping-right {
      transform: rotateY(15deg);
    }

    .product-page {
      width: 100%;
      height: 100%;
      overflow-y: auto;
      padding: 30px;
      background: white;
    }

    .product-page-content {
      max-width: 500px;
      margin: 0 auto;
    }

    .product-page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 2px solid #f0f0f0;
    }

    .product-page-number {
      font-size: 12px;
      font-weight: 600;
      color: #8aa646;
      background: rgba(138, 166, 70, 0.1);
      padding: 4px 12px;
      border-radius: 20px;
    }

    .product-page-sku {
      font-size: 11px;
      color: #94a3b8;
      font-family: monospace;
    }

    .product-page-image {
      width: 100%;
      height: 250px;
      background: #f8fafc;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      overflow: hidden;
    }

    .product-page-image img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .image-placeholder {
      font-size: 64px;
      font-weight: 600;
      color: #cbd5e1;
    }

    .product-page-title {
      font-family: 'Playfair Display', 'Inter', serif;
      font-size: 28px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 16px;
      color: #0f172a;
    }

    .product-page-description {
      font-size: 14px;
      line-height: 1.6;
      color: #475569;
      margin-bottom: 24px;
    }

    .product-page-details {
      border-top: 1px solid #e2e8f0;
      padding-top: 20px;
    }

    .product-page-price {
      text-align: center;
      margin-bottom: 16px;
    }

    .price-main {
      font-size: 32px;
      font-weight: 800;
      color: #8aa646;
      display: block;
    }

    .price-iva {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 4px;
      display: block;
    }

    .product-page-iva {
      text-align: center;
      margin-bottom: 20px;
    }

    .iva-badge {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .iva-excluido {
      background: #2563eb;
      color: white;
    }

    .iva-exento {
      background: #16a34a;
      color: white;
    }

    .iva-gravado {
      background: #8aa646;
      color: white;
    }

    .product-page-link {
      display: inline-block;
      text-align: center;
      width: 100%;
      padding: 12px;
      background: #f1f5f9;
      color: #1e293b;
      text-decoration: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.2s ease;
      margin-top: 16px;
    }

    .product-page-link:hover {
      background: #8aa646;
      color: white;
    }

    .cover-page {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
      color: white;
    }

    .cover-logo {
      margin-bottom: 40px;
    }

    .cover-logo img {
      max-height: 80px;
    }

    .cover-title {
      font-size: 48px;
      font-weight: 800;
      margin-bottom: 20px;
      font-family: 'Playfair Display', serif;
    }

    .cover-subtitle {
      font-size: 18px;
      opacity: 0.9;
      margin-bottom: 40px;
    }

    .cover-date {
      font-size: 14px;
      opacity: 0.7;
    }

    .end-page {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
      color: white;
    }

    .end-title {
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 20px;
      font-family: 'Playfair Display', serif;
    }

    .end-text {
      font-size: 16px;
      opacity: 0.8;
      margin-bottom: 30px;
    }

    .end-contact {
      font-size: 12px;
      border-top: 1px solid rgba(255,255,255,0.2);
      padding-top: 30px;
      margin-top: 30px;
    }

    .page-number-footer {
      position: absolute;
      bottom: 15px;
      right: 20px;
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      backdrop-filter: blur(4px);
    }

    @media (max-width: 900px) {
      .spread {
        grid-template-columns: 1fr;
      }
      .page-shell.left {
        display: none;
      }
      .book {
        height: min(80vh, 700px);
      }
      .product-page-title {
        font-size: 24px;
      }
      .price-main {
        font-size: 28px;
      }
    }
  </style>
</head>

        <div class="page-shell left" id="leftShell"></div>

      </div>
    </div>
  </div>

        leftShell.style.display = 'none';
        const rightPageNum = currentSpreadStart;
        rightShell.innerHTML = pagesData[rightPageNum] || '<div class="placeholder">Sin página</div>';
        addPageNumber(rightShell, rightPageNum + 1);
      } else {
        leftShell.style.display = 'flex';
        const leftPageNum = currentSpreadStart;
        const rightPageNum = currentSpreadStart + 1;
        
        leftShell.innerHTML = pagesData[leftPageNum] || '<div class="placeholder">Sin página</div>';
        rightShell.innerHTML = pagesData[rightPageNum] || '<div class="placeholder">Sin página</div>';
        
        addPageNumber(leftShell, leftPageNum + 1);
        addPageNumber(rightShell, rightPageNum + 1);
      }
      
      updateButtons();
    }
    
    function addPageNumber(shell, pageNum) {
      const existingNumber = shell.querySelector('.page-number-footer');
      if (existingNumber) existingNumber.remove();
      
      const pageNumberDiv = document.createElement('div');
      pageNumberDiv.className = 'page-number-footer';
      pageNumberDiv.textContent = pageNum + ' / ' + totalPages;
      shell.appendChild(pageNumberDiv);
    }
    
    function animateFlip(direction) {
      if (direction === 'next') {
        rightShell.classList.add('flipping-right');
        setTimeout(() => rightShell.classList.remove('flipping-right'), 400);
      } else {
        leftShell.classList.add('flipping-left');
        setTimeout(() => leftShell.classList.remove('flipping-left'), 400);
      }
    }
    
    function goToPrevPage() {
      if (currentSpreadStart <= 0) return;
      animateFlip('prev');
      
      if (window.innerWidth <= 900) {
        currentSpreadStart--;
      } else {
        currentSpreadStart -= 2;
        if (currentSpreadStart < 0) currentSpreadStart = 0;
      }
      
      renderSpread();
    }
    
    function goToNextPage() {
      const mobile = window.innerWidth <= 900;
      const maxStart = mobile ? totalPages - 1 : totalPages - 2;
      
      if (currentSpreadStart >= maxStart) return;
      animateFlip('next');
      
      if (mobile) {
        currentSpreadStart++;
      } else {
        currentSpreadStart += 2;
        if (currentSpreadStart > maxStart) currentSpreadStart = maxStart;
      }
      
      renderSpread();
    }
    
    function updateButtons() {
      const mobile = window.innerWidth <= 900;
      const maxStart = mobile ? totalPages - 1 : totalPages - 2;
      
      prevBtn.disabled = currentSpreadStart <= 0;
      nextBtn.disabled = currentSpreadStart >= maxStart;
      
      const mobileCurrent = currentSpreadStart + 1;
      statusEl.textContent = mobile 
        ? `Página ${mobileCurrent} de ${totalPages}`
        : `Páginas ${currentSpreadStart + 1} - ${Math.min(currentSpreadStart + 2, totalPages)} de ${totalPages}`;
    }
    
    function downloadPdf() {
      const urlParams = new URLSearchParams(window.location.search);
      const docId = urlParams.get('id');
      if (docId) {
        window.open('/api/pdf/download/' + docId, '_blank');
      } else {
        window.print();
      }
    }
    
    prevBtn.addEventListener('click', goToPrevPage);
    nextBtn.addEventListener('click', goToNextPage);
    downloadBtn.addEventListener('click', downloadPdf);
    
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') goToPrevPage();
      if (e.key === 'ArrowRight') goToNextPage();
    });
    
    window.addEventListener('resize', () => renderSpread());
    
    renderSpread();
    statusEl.textContent = `Catálogo listo - ${totalPages} páginas`;
  </script>
</body>
</html>
